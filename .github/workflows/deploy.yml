name: CI/CD Pipeline for Spring Boot on Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      JAR_FILE: build/libs/gava-0.0.1-SNAPSHOT.jar
      REMOTE_DIR: /home/mong3125/app/gava
      SERVICE_NAME: gava

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. JDK 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'

      # 3. Gradle 빌드 및 테스트
      - name: Build with Gradle (including tests)
        run: ./gradlew clean build

      # 4. 빌드된 JAR 파일을 서버로 전송
      - name: Copy JAR file via SCP
        uses: appleboy/scp-action@v0.2.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: ${{ env.JAR_FILE }}
          target: ${{ env.REMOTE_DIR }}

      # 5. SSH를 통해 서버에서 애플리케이션 및 Nginx 재시작
      - name: Restart Application
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            sudo systemctl stop ${{ env.SERVICE_NAME }}
            sudo mv ${{ env.REMOTE_DIR }}/gava-0.0.1-SNAPSHOT.jar ${{ env.REMOTE_DIR }}/app.jar
            sudo systemctl start ${{ env.SERVICE_NAME }}
            sudo systemctl reload nginx
